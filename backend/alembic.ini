# ============================================================
# Alembic 数据库迁移配置文件
# 使用方式: alembic upgrade head / alembic revision --autogenerate -m "描述"
# ============================================================

[alembic]
# 迁移脚本目录
script_location = alembic

# SQLAlchemy 连接 URL
# 优先从环境变量 DATABASE_SYNC_URL 读取，也可在此处硬编码（不推荐）
# 使用 dmPython 同步驱动进行迁移（达梦数据库 DM8）
sqlalchemy.url = %(DATABASE_SYNC_URL)s

# 模板文件（用于生成迁移脚本）
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 是否使用双引号包裹标识符
quote_schema = false

# 迁移文件输出编码
output_encoding = utf-8

# 是否在迁移脚本中包含 sys.path 修改
# prepend_sys_path = .

# 迁移版本路径（默认使用 script_location）
# version_path_separator = os

# 迁移版本位置
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# 迁移文件时间格式
# timezone =

# 迁移文件最大长度
# truncate_slug_length = 40

# 修订 ID 长度
# revision_id_length = 16

# 迁移源文件后缀
# sourceless = false

# 迁移版本路径分隔符
# version_path_separator = os

# 输出编码
# output_encoding = utf-8

# ============================================================
# 日志配置
# ============================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
