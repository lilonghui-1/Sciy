# ============================================================
# 库存管理系统 - 生产环境 Docker Compose 配置
# 使用方式: docker compose up -d --build
# ============================================================

services:
  # ----------------------------------------------------------
  # 达梦数据库 DM8
  # ----------------------------------------------------------
  db:
    image: dm8:latest
    container_name: inventory_db
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      PAGE_SIZE: 32
      CASE_SENSITIVE: 0
      CHARSET: 1
      SYSDBA_PWD: ${SYSDBA_PWD:-SYSDBA001}
    volumes:
      - dmdata:/opt/dmdbms/data
    healthcheck:
      test: ["CMD-SHELL", "disql SYSDBA/SYSDBA001 -c 'SELECT 1 FROM DUAL'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - inventory_network

  # ----------------------------------------------------------
  # Redis 缓存 / 消息代理
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: inventory_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network

  # ----------------------------------------------------------
  # FastAPI 后端服务
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inventory_network

  # ----------------------------------------------------------
  # Celery 异步任务工作进程
  # ----------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks worker -l info --concurrency 4 --max-tasks-per-child 1000
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - inventory_network

  # ----------------------------------------------------------
  # Celery 定时任务调度器
  # ----------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - inventory_network

  # ----------------------------------------------------------
  # Vue.js 前端 (Nginx 静态服务)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - inventory_network

# ============================================================
# 持久化存储卷
# ============================================================
volumes:
  dmdata:
    driver: local
  redisdata:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  inventory_network:
    driver: bridge
