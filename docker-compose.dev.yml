# ============================================================
# 库存管理系统 - 开发环境 Docker Compose 覆盖配置
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# 或使用 make dev
# ============================================================

services:
  # ----------------------------------------------------------
  # 后端 - 挂载本地代码，启用热重载
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    volumes:
      # 挂载本地代码，实现热重载
      - ./backend/app:/app/app
      # 挂载 alembic 迁移目录
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
      # 暴露调试端口 (debugpy)
      - "5678:5678"
    environment:
      - APP_ENV=development
      - DEBUG=true

  # ----------------------------------------------------------
  # Celery Worker - 挂载本地代码
  # ----------------------------------------------------------
  celery-worker:
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    command: celery -A app.tasks worker -l debug --concurrency 2

  # ----------------------------------------------------------
  # Celery Beat - 挂载本地代码
  # ----------------------------------------------------------
  celery-beat:
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    command: celery -A app.tasks beat -l debug --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ----------------------------------------------------------
  # 前端 - 挂载本地代码，启用 Vite 开发服务器
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      # 挂载本地前端源码
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/env.d.ts:/app/env.d.ts
      # 防止容器内 node_modules 覆盖本地
      - frontend_node_modules:/app/node_modules
    ports:
      - "80:5173"
      # 暴露 Vite HMR 端口
      - "5173:5173"

# ============================================================
# 开发环境专用卷
# ============================================================
volumes:
  frontend_node_modules:
    driver: local
