# ============================================================
# 库存管理系统 - Nginx 配置
# 功能：API 反向代理、WebSocket 代理、SSE 代理、SPA 路由、静态资源缓存
# ============================================================

# 上游后端服务定义
upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # 安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # 最大上传文件大小（用于图片上传等）
    client_max_body_size 50M;

    # ----------------------------------------------------------
    # API 反向代理
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 连接超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # ----------------------------------------------------------
    # SSE（Server-Sent Events）代理
    # 用于 AI 聊天流式响应，必须关闭缓冲以确保实时推送
    # ----------------------------------------------------------
    location /api/v1/ai/chat {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必须关闭缓冲，确保数据实时推送
        proxy_buffering off;
        proxy_cache off;

        # SSE 必须保持长连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 禁用超时（SSE 连接可能持续很长时间）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 设置正确的 Content-Type
        proxy_set_header Accept "text/event-stream";
        proxy_set_header Cache-Control "no-cache";
        proxy_set_header X-Accel-Buffering "no";
    }

    # ----------------------------------------------------------
    # WebSocket 代理
    # 用于实时库存更新通知、消息推送等
    # ----------------------------------------------------------
    location /ws/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 必须使用 HTTP/1.1 并设置 Upgrade 头
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket 长连接超时设置
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 关闭缓冲
        proxy_buffering off;
    }

    # ----------------------------------------------------------
    # 静态资源缓存策略
    # 带 hash 的静态文件（JS/CSS/图片）设置长期缓存
    # ----------------------------------------------------------
    location ~* \.(?:js|css|woff|woff2|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # 允许跨域请求字体文件
        if ($request_filename ~* \.(?:woff|woff2|ttf|eot|svg)$) {
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "public, immutable";
        }
    }

    # ----------------------------------------------------------
    # SPA 单页应用路由回退
    # 所有未匹配的请求返回 index.html，由前端路由处理
    # ----------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------
    # 禁止访问隐藏文件（如 .git、.env 等）
    # ----------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ----------------------------------------------------------
    # 错误页面
    # ----------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
